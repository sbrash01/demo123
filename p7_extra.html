<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JS Problem 7 Extra Credit - State List</title>
<style>
  body { font-family: Arial, sans-serif; margin: 40px; }
  #controls { display: flex; align-items: flex-start; gap: 15px; }
  select { min-width: 160px; }
  #stateDiv {
    border: 1px solid #333;
    min-width: 200px;
    min-height: 150px;
    margin-top: 20px;
    padding: 10px 10px 10px 30px;
  }
  button { padding: 6px 12px; cursor: pointer; }
</style>
</head>
<body>

<h1>Problem 7 (Extra Credit): State List</h1>

<div id="controls">
  <select id="stateSelect" size="10"></select>
  <button id="addBtn">Add State</button>
</div>

<div id="stateDiv"></div>
<button id="clearBtn">Clear States</button>

<script>
  // master list - never mutated, used to restore the select
  var allStates = [
    "Alabama", "Alaska", "Arizona", "Arkansas", "California",
    "Colorado", "Connecticut", "Delaware", "Florida", "Georgia"
  ];

  // working list - states currently available in the select
  var availableStates = allStates.slice();

  function buildSelect() {
    var select = document.getElementById("stateSelect");
    select.innerHTML = "";
    for (var i = 0; i < availableStates.length; i++) {
      var option = document.createElement("option");
      option.value = availableStates[i];
      option.text = availableStates[i];
      select.appendChild(option);
    }
    if (availableStates.length > 0) {
      select.selectedIndex = 0;
    }
  }

  function addState() {
    var select = document.getElementById("stateSelect");
    var index = select.selectedIndex;
    if (index === -1) return; // nothing left to add

    var stateName = availableStates[index];

    // add to the numbered list in the div
    var div = document.getElementById("stateDiv");
    var ol = div.querySelector("ol");
    if (!ol) {
      ol = document.createElement("ol");
      div.appendChild(ol);
    }
    var li = document.createElement("li");
    li.textContent = stateName;
    ol.appendChild(li);

    // remove from the available list / select
    availableStates.splice(index, 1);
    buildSelect();
  }

  function clearStates() {
    document.getElementById("stateDiv").innerHTML = "";
    availableStates = allStates.slice();
    buildSelect();
  }

  window.onload = function() {
    buildSelect();
    document.getElementById("addBtn").onclick = addState;
    document.getElementById("clearBtn").onclick = clearStates;
  };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JSON Problem 1 - Song List</title>
<style>
  body { font-family: Arial, sans-serif; margin: 40px; }
  pre {
    background: #f4f4f4;
    border: 1px solid #ccc;
    padding: 15px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
</style>
</head>
<body>

<h1>Part 1: Song List JSON</h1>

<script>
  var songList = {
    "songs": [
      {
        "title": "Who Loves You",
        "artist": "The Four Seasons",
        "year": 1975,
        "genres": ["rock", "disco"]
      },
      {
        "title": "December, 1963 (Oh, What a Night)",
        "artist": "The Four Seasons",
        "year": 1975,
        "genres": ["rock", "disco"]
      },
      {
        "title": "Sherry",
        "artist": "The Four Seasons",
        "year": 1962,
        "genres": ["pop"]
      },
      {
        "title": "Dreams",
        "artist": "Fleetwood Mac",
        "year": 1977,
        "genres": ["rock", "pop"]
      },
      {
        "title": "Go Your Own Way",
        "artist": "Fleetwood Mac",
        "year": 1977,
        "genres": ["rock"]
      },
      {
        "title": "Landslide",
        "artist": "Fleetwood Mac",
        "year": 1975,
        "genres": ["pop", "rock"]
      },
      {
        "title": "Ring of Fire",
        "artist": "Johnny Cash",
        "year": 1963,
        "genres": ["country"]
      },
      {
        "title": "Folsom Prison Blues",
        "artist": "Johnny Cash",
        "year": 1955,
        "genres": ["country"]
      }
    ]
  };

  // Convert the JSON object to a string
  var songListString = JSON.stringify(songList);

  window.onload = function() {
    document.getElementById("output").textContent = songListString;
  };
</script>

<h2>JSON as a string:</h2>
<pre id="output"></pre>

</body>
</html>

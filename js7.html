<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JS Problem 7 - State List</title>
<style>
  body { font-family: Arial, sans-serif; margin: 40px; }
  #controls { display: flex; align-items: flex-start; gap: 15px; }
  select { min-width: 160px; }
  #stateDiv {
    border: 1px solid #333;
    min-width: 200px;
    min-height: 150px;
    margin-top: 20px;
    padding: 10px;
  }
  button { padding: 6px 12px; cursor: pointer; }
</style>
</head>
<body>

<h1>Problem 7: State List</h1>

<div id="controls">
  <select id="stateSelect" size="10"></select>
  <button id="addBtn">Add State</button>
</div>

<div id="stateDiv"></div>
<button id="clearBtn">Clear States</button>

<script>
  var states = [
    "Alabama", "Alaska", "Arizona", "Arkansas", "California",
    "Colorado", "Connecticut", "Delaware", "Florida", "Georgia"
  ];

  function buildSelect() {
    var select = document.getElementById("stateSelect");
    select.innerHTML = "";
    for (var i = 0; i < states.length; i++) {
      var option = document.createElement("option");
      option.value = states[i];
      option.text = states[i];
      select.appendChild(option);
    }
    select.selectedIndex = 0;
  }

  function addState() {
    var select = document.getElementById("stateSelect");
    var selected = select.options[select.selectedIndex];
    if (!selected) return;

    var div = document.getElementById("stateDiv");
    var p = document.createElement("p");
    p.textContent = selected.value;
    p.style.margin = "2px 0";
    div.appendChild(p);
  }

  function clearStates() {
    document.getElementById("stateDiv").innerHTML = "";
  }

  window.onload = function() {
    buildSelect();
    document.getElementById("addBtn").onclick = addState;
    document.getElementById("clearBtn").onclick = clearStates;
  };
</script>

</body>
</html>
